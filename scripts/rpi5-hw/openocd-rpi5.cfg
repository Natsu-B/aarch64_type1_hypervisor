# Raspberry Pi 5 / BCM2712 SWD target for local hardware debugging.
# Based on the BCM2712 OpenOCD config published by tnishinaga in:
#   https://www.raspi.jp/2024/03/raspberry-pi-5-hardware-debbuging/
# That article states the config is based on OpenOCD target/bcm2711.cfg and is provided under the
# same GPL-2.0 license. Local changes keep CPU GDB ports predictable, disable the MEM-AP GDB port,
# and defer non-boot core examination.
#
# Usage:
#   openocd -f interface/cmsis-dap.cfg -f scripts/rpi5-hw/openocd-rpi5.cfg

if { [info exists CHIPNAME] } {
        set _CHIPNAME $CHIPNAME
} else {
        set _CHIPNAME bcm2712
}

if { [info exists CHIPCORES] } {
        set _cores $CHIPCORES
} else {
        set _cores 4
}

if { [info exists USE_SMP] } {
        set _USE_SMP $USE_SMP
} else {
        set _USE_SMP 0
}

if { [info exists DAP_TAPID] } {
        set _DAP_TAPID $DAP_TAPID
} else {
        set _DAP_TAPID 0x4ba00477
}

if { [info exists ADAPTER_SPEED] } {
        set _ADAPTER_SPEED $ADAPTER_SPEED
} else {
        set _ADAPTER_SPEED 1000
}

transport select swd

swd newdap $_CHIPNAME cpu -expected-id $_DAP_TAPID -irlen 4
adapter speed $_ADAPTER_SPEED

dap create $_CHIPNAME.dap -chain-position $_CHIPNAME.cpu

# MEM-AP for direct access. Disable GDB on this pseudo-target so CPU ports stay predictable.
target create $_CHIPNAME.ap mem_ap -dap $_CHIPNAME.dap -ap-num 0 -gdb-port disabled

# These addresses are obtained from the ROM table via the 'dap info 0' command.
set _DBGBASE {0x80010000 0x80110000 0x80210000 0x80310000}
set _CTIBASE {0x80020000 0x80120000 0x80220000 0x80320000}

set _smp_command "target smp"

for { set _core 0 } { $_core < $_cores } { incr _core } {
        set _CTINAME $_CHIPNAME.cti$_core
        set _TARGETNAME $_CHIPNAME.cpu$_core
        set _GDB_PORT [expr {3333 + $_core}]

        cti create $_CTINAME -dap $_CHIPNAME.dap -ap-num 0 -baseaddr [lindex $_CTIBASE $_core]

        set _target_command "target create $_TARGETNAME aarch64 \
                -dap $_CHIPNAME.dap \
                -ap-num 0 \
                -dbgbase [lindex $_DBGBASE $_core] \
                -cti $_CTINAME \
                -coreid $_core \
                -gdb-port $_GDB_PORT"

        if { $_core != 0 } {
                set _target_command "$_target_command -defer-examine"
        }

        eval $_target_command

        set _smp_command "$_smp_command $_TARGETNAME"
}

if {$_USE_SMP} {
        eval $_smp_command
}

targets $_CHIPNAME.cpu0
